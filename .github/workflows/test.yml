name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# 같은 PR 내 새 push가 오면 이전 실행 자동 취소.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # lint는 기존 react-hooks 룰 위반 다수로 인해 일시 비차단.
      # 신규 코드는 lint clean 유지하되 기존 cleanup은 별도 PR.
      - run: npm run lint
        continue-on-error: true
      - run: npm run typecheck

  # FSD layer boundary 룰 (eslint-plugin-boundaries) 회귀 차단.
  # 다른 룰의 잔여 error 가 lint-and-typecheck job 의 continue-on-error
  # 와 묶여 흐려지지 않도록 boundary 룰만 grep 기반으로 분리 검사한다.
  fsd-boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Verify no boundary violations
        run: |
          set -o pipefail
          npx eslint . --no-warn-ignored > /tmp/lint.txt 2>&1 || true
          count=$(grep -c 'boundaries/element-types' /tmp/lint.txt || true)
          echo "FSD boundary violations: $count"
          if [ "$count" != "0" ]; then
            echo "::error::FSD boundary violations detected"
            grep -B 1 'boundaries/element-types' /tmp/lint.txt | sed 's/^/  /'
            exit 1
          fi

  cleanup-completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Verify all schema tables in cleanup helper
        run: npm run check:cleanup

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # electronegativity 베이스라인 (CSP/navigation/permission 3건) 위에 신규 HIGH
      # 이슈가 추가되지 않는지 회귀 차단. 베이스라인 자체는 별도 보안 항목으로 추적.
      - name: Electron security scan
        run: npm run security:scan
        continue-on-error: true

  bundle-chunks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # 성능-1: manualChunks 설정이 잘못되어 vendor 라이브러리가 다시 메인
      # 청크로 합쳐지면 회귀로 차단.
      - name: Build renderer
        run: npx electron-vite build
      - name: Verify expected chunks exist
        run: node scripts/verify-chunks.mjs
      - name: Print bundle size summary
        run: node scripts/measure-bundle.mjs >> $GITHUB_STEP_SUMMARY

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run main process tests with coverage
        run: npm run test:coverage:node
      - name: Upload coverage (node)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
          retention-days: 7

  # PR 차단용 빠른 renderer test — 4-way shard 병렬 실행 (coverage 미측정).
  # 가장 느린 shard 기준 1분 이하 목표. coverage 지표는 coverage-web job 이 담당.
  test-web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    name: test-web (shard ${{ matrix.shard }}/4)
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run renderer tests (shard ${{ matrix.shard }}/4)
        run: npm run test:web -- --shard ${{ matrix.shard }}/4

  # coverage 지표 전용 job — PR 차단 게이트(test-web shard)와 분리해 병렬 실행.
  # 느려도 빠른 게이트를 막지 않으며 coverage-summary 에 web 커버리지를 공급한다.
  coverage-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run renderer tests with coverage
        run: npm run test:coverage:web
      - name: Upload coverage (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
          retention-days: 7

  coverage-summary:
    runs-on: ubuntu-latest
    needs: [test-node, coverage-web]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - uses: actions/download-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
        continue-on-error: true
      - name: Build coverage summary
        id: coverage
        run: |
          {
            echo '## Coverage Summary'
            echo ''
            npm run --silent coverage:summary | awk '/^\| Area/{p=1} p'
          } > coverage-comment.md
          cat coverage-comment.md >> $GITHUB_STEP_SUMMARY
      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-summary
          path: coverage-comment.md
