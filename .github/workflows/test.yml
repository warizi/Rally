name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# 같은 PR 내 새 push가 오면 이전 실행 자동 취소.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # lint는 기존 react-hooks 룰 위반 다수로 인해 일시 비차단.
      # 신규 코드는 lint clean 유지하되 기존 cleanup은 별도 PR.
      - run: npm run lint
        continue-on-error: true
      - run: npm run typecheck

  cleanup-completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Verify all schema tables in cleanup helper
        run: npm run check:cleanup

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # electronegativity 베이스라인 (CSP/navigation/permission 3건) 위에 신규 HIGH
      # 이슈가 추가되지 않는지 회귀 차단. 베이스라인 자체는 별도 보안 항목으로 추적.
      - name: Electron security scan
        run: npm run security:scan
        continue-on-error: true

  bundle-chunks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # 성능-1: manualChunks 설정이 잘못되어 vendor 라이브러리가 다시 메인
      # 청크로 합쳐지면 회귀로 차단.
      - name: Build renderer
        run: npx electron-vite build
      - name: Verify expected chunks exist
        run: node scripts/verify-chunks.mjs
      - name: Print bundle size summary
        run: node scripts/measure-bundle.mjs >> $GITHUB_STEP_SUMMARY

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run main process tests with coverage
        run: npm run test:coverage:node
      - name: Upload coverage (node)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
          retention-days: 7

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run renderer tests with coverage
        run: npm run test:coverage:web
      - name: Upload coverage (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
          retention-days: 7

  coverage-summary:
    runs-on: ubuntu-latest
    needs: [test-node, test-web]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - uses: actions/download-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
        continue-on-error: true
      - name: Print summary to PR
        run: npm run coverage:summary >> $GITHUB_STEP_SUMMARY
