name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# 같은 PR 내 새 push가 오면 이전 실행 자동 취소.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # lint 는 develop 기준 0 errors / 0 warnings (품질 개선 완료, PR #311).
      # 신규 회귀를 차단하기 위해 --max-warnings 0 으로 경고도 실패 처리하는 차단 게이트.
      - run: npm run lint -- --max-warnings 0
      - run: npm run typecheck

  # FSD layer boundary 룰 (eslint-plugin-boundaries) 회귀 차단.
  # lint-and-typecheck 가 차단 게이트라 boundary 위반도 거기서 잡히지만,
  # 어떤 경계가 깨졌는지 명확한 메시지를 주기 위해 boundary 룰만 별도로 grep 검사한다.
  fsd-boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Verify no boundary violations
        run: |
          set -o pipefail
          npx eslint . --no-warn-ignored > /tmp/lint.txt 2>&1 || true
          count=$(grep -c 'boundaries/element-types' /tmp/lint.txt || true)
          echo "FSD boundary violations: $count"
          if [ "$count" != "0" ]; then
            echo "::error::FSD boundary violations detected"
            grep -B 1 'boundaries/element-types' /tmp/lint.txt | sed 's/^/  /'
            exit 1
          fi

  cleanup-completeness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Verify all schema tables in cleanup helper
        run: npm run check:cleanup

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # 신규 HIGH severity Electron security finding 을 차단하는 게이트.
      # electronegativity 는 finding 이 있어도 exit 0 이라, 출력을 파싱해 HIGH 발견 시 fail.
      # security:scan:high 는 free 버전 false positive 인 LIMIT_NAVIGATION_GLOBAL_CHECK 만
      # 제외(-x) — will-navigate 통제는 src/main/__tests__/window-security.test.ts 가 강제.
      # 네트워크/Electron 버전탐지 경고는 finding 행이 아니므로 게이트에 영향 없음.
      - name: Electron security scan (high severity, blocking)
        run: |
          set -o pipefail
          out=$(npm run security:scan:high 2>&1) || true
          echo "$out"
          high=$(echo "$out" | grep -cE 'HIGH \| (CERTAIN|FIRM|TENTATIVE)' || true)
          echo "High severity findings: $high"
          if [ "$high" != "0" ]; then
            echo "::error::High severity Electron security finding detected"
            exit 1
          fi

  bundle-chunks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      # 성능-1: manualChunks 설정이 잘못되어 vendor 라이브러리가 다시 메인
      # 청크로 합쳐지면 회귀로 차단.
      - name: Build renderer
        run: npx electron-vite build
      - name: Verify expected chunks exist
        run: node scripts/verify-chunks.mjs
      - name: Print bundle size summary
        run: node scripts/measure-bundle.mjs >> $GITHUB_STEP_SUMMARY

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run main process tests with coverage
        run: npm run test:coverage:node
      - name: Upload coverage (node)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
          retention-days: 7

  # PR 차단용 빠른 renderer test — 4-way shard 병렬 실행 (coverage 미측정).
  # 가장 느린 shard 기준 1분 이하 목표. coverage 지표는 coverage-web job 이 담당.
  test-web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    name: test-web (shard ${{ matrix.shard }}/4)
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run renderer tests (shard ${{ matrix.shard }}/4)
        run: npm run test:web -- --shard ${{ matrix.shard }}/4

  # coverage 지표 — 4-way shard 병렬 측정 (blob 리포트). 단일 3분 실행을 shard 당 1분 이하로 단축.
  # 부분 커버리지라 shard 에서는 threshold 를 끄고(VITEST_SKIP_THRESHOLDS), 임계값은 merge 단계에서 평가.
  coverage-web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    name: coverage-web (shard ${{ matrix.shard }}/4)
    env:
      VITEST_SKIP_THRESHOLDS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Run renderer coverage (shard ${{ matrix.shard }}/4)
        run: npm run test:coverage:web:shard -- --shard ${{ matrix.shard }}/4
      - name: Upload coverage blob (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web-blob-${{ matrix.shard }}
          # .vitest-reports 는 dot 디렉토리라 upload-artifact 기본 제외 → 명시적으로 포함.
          include-hidden-files: true
          path: .vitest-reports/
          retention-days: 1

  # shard blob 들을 병합해 단일 web coverage 리포트 생성 (테스트 재실행 없이 ~수초).
  # 머지된 리포트에서만 coverage threshold 를 평가한다.
  coverage-web-merge:
    runs-on: ubuntu-latest
    needs: coverage-web
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - name: Download coverage blobs
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-web-blob-*
          path: .vitest-reports/
          merge-multiple: true
      - name: Merge coverage reports
        run: npm run test:coverage:web:merge
      - name: Upload coverage (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
          retention-days: 7

  coverage-summary:
    runs-on: ubuntu-latest
    needs: [test-node, coverage-web-merge]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-and-install
      - uses: actions/download-artifact@v4
        with:
          name: coverage-node
          path: coverage/node/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/
        continue-on-error: true
      - name: Build coverage summary
        id: coverage
        run: |
          {
            echo '## Coverage Summary'
            echo ''
            npm run --silent coverage:summary | awk '/^\| Area/{p=1} p'
          } > coverage-comment.md
          cat coverage-comment.md >> $GITHUB_STEP_SUMMARY
      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-summary
          path: coverage-comment.md
